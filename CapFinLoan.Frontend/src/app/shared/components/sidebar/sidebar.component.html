<aside class="h-screen w-72 fixed left-0 top-0 hidden md:flex flex-col bg-slate-50 dark:bg-slate-950 border-r border-slate-200/10 z-50">
    <div class="p-6 mb-4">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[var(--color-primary-container)] rounded-lg flex items-center justify-center text-white">
                <span class="material-symbols-outlined">{{ headerIcon() }}</span>
            </div>
            <div>
                <span class="block font-headline font-bold text-2xl text-[var(--color-primary)]">{{ headerTitle() }}</span>
                <span class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-400">{{ headerSubtitle() }}</span>
            </div>
        </div>
    </div>
    
    <nav class="flex flex-col gap-2 p-6 flex-1">
        @for (item of navItems(); track item.path) {
            <a
                [routerLink]="item.path"
                [routerLinkActive]="'bg-white dark:bg-slate-900 text-[var(--color-primary-container)] dark:text-blue-100 shadow-sm'"
                [routerLinkActiveOptions]="{ exact: item.exact }"
                class="flex items-center gap-3 px-4 py-3 text-slate-500 dark:text-slate-400 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-900 transition-all duration-200 font-label text-sm font-medium"
                [class.text-blue-950]="false" 
            >
                <span class="material-symbols-outlined text-xl">{{ item.icon }}</span>
                {{ item.label }}
            </a>
        }
    </nav>
    
    <div class="p-6 mt-auto">
        @if (role() === 'APPLICANT') {
            <a
                routerLink="/applicant/apply"
                class="w-full flex items-center justify-center gap-2 bg-[var(--color-primary-container)] text-white py-3 rounded-xl font-bold text-sm shadow-md hover:opacity-90 transition-all cursor-pointer"
            >
                <span class="material-symbols-outlined text-sm">add_circle</span>
                New Application
            </a>
        } @else {
            <a
                routerLink="/admin/reports"
                class="w-full flex items-center justify-center gap-2 bg-[var(--color-primary-container)] text-white py-3 rounded-xl font-bold text-sm shadow-md hover:opacity-90 transition-all cursor-pointer"
            >
                <span class="material-symbols-outlined text-sm">analytics</span>
                View Reports
            </a>
        }
        
        <button
            (click)="auth.logout()"
            class="w-full flex items-center gap-3 px-4 py-3 mt-4 text-slate-500 dark:text-slate-400 hover:text-[var(--color-error)] transition-colors font-label text-sm font-medium"
        >
            <span class="material-symbols-outlined text-xl">logout</span>
            Logout
        </button>
    </div>
</aside>
