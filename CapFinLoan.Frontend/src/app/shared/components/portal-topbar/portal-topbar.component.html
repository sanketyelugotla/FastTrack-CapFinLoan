<header class="bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-xl sticky top-0 z-40 border-b border-slate-100/50 dark:border-slate-900/50 shadow-sm dark:shadow-none">
    <nav class="flex justify-between items-center px-6 py-3 w-full max-w-screen-2xl mx-auto">
        <div class="flex items-center gap-4">
            <h2 class="font-headline font-bold text-lg text-[var(--color-primary)] dark:text-blue-400">{{ sectionTitle() }}</h2>
        </div>
        <div class="flex items-center gap-2">
            <button class="p-2 text-slate-500 hover:text-blue-600 dark:text-slate-400 dark:hover:text-blue-400 transition-colors rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 flex items-center justify-center">
                <span class="material-symbols-outlined">notifications</span>
            </button>
            <button class="p-2 text-slate-500 hover:text-blue-600 dark:text-slate-400 dark:hover:text-blue-400 transition-colors rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 flex items-center justify-center">
                <span class="material-symbols-outlined">help</span>
            </button>
            
            <div class="mx-2 hidden sm:block border-l border-slate-200 dark:border-slate-700 h-6"></div>

            <div class="flex items-center gap-3">
                <div class="hidden sm:block text-right">
                    <p class="text-sm font-semibold text-slate-800 dark:text-slate-200">{{ auth.currentUser()?.name }}</p>
                    <p class="text-[10px] font-bold uppercase tracking-[0.1em] text-slate-500 dark:text-slate-400">{{ auth.currentUser()?.role }}</p>
                </div>
                <div class="w-9 h-9 flex items-center justify-center rounded-full bg-[var(--color-primary-container)] text-white text-sm font-bold shadow-sm cursor-pointer">
                    {{ userInitial() }}
                </div>
            </div>
        </div>
    </nav>
</header>
